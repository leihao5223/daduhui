<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大都汇管理后台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#eff6ff',
              100: '#dbeafe',
              200: '#bfdbfe',
              300: '#93c5fd',
              400: '#60a5fa',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
              800: '#1e40af',
              900: '#1e3a8a',
            }
          }
        }
      }
    }
  </script>
  <style>
    .container-responsive {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 1rem;
    }
    @media (min-width: 640px) {
      .container-responsive {
        padding: 0 1.5rem;
      }
    }
    @media (min-width: 1024px) {
      .container-responsive {
        padding: 0 2rem;
      }
    }
    .fade-in {
      animation: fadeIn 0.3s ease-in;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="root"></div>

  <script>
    const logoUrl = 'https://conversation.cdn.meoo.host/conversations/308104559711129600/image/2026-04-30/1777550396573-image.png?auth_key=9b76b96a40c7b392fc30d0ef304ed43f39f05414009ad3e74e6eb35e951d912c';

    const defaultConfig = {
      banners: [
        { id: 1, image: logoUrl, link: '' },
        { id: 2, image: logoUrl, link: '' },
        { id: 3, image: logoUrl, link: '' },
      ],
      gameImages: [
        { id: 'xinmacau', image: logoUrl, link: '/game/xinmacau' },
        { id: 'laomacau', image: logoUrl, link: '/game/laomacau' },
        { id: 'canada20', image: logoUrl, link: '/game/canada20' },
      ],
      notices: ['恭喜用户中奖', '新期即将开奖', '系统维护通知']
    };

    const mockSessions = [
      { id: '1', userId: '13800138000', userName: '张三', avatar: logoUrl, lastMessage: '充值多久能到账？', lastTime: '10:23', unread: 2, status: 'online', tags: ['充值问题'] },
      { id: '2', userId: '13800138001', userName: '李四', avatar: logoUrl, lastMessage: '提现失败了', lastTime: '09:45', unread: 1, status: 'offline', tags: ['提现问题'] },
      { id: '3', userId: '13800138002', userName: '王五', avatar: logoUrl, lastMessage: '谢谢客服', lastTime: '昨天', unread: 0, status: 'online', tags: [] },
      { id: '4', userId: '13800138003', userName: '赵六', avatar: logoUrl, lastMessage: '怎么成为代理？', lastTime: '昨天', unread: 0, status: 'busy', tags: ['代理咨询'] },
      { id: '5', userId: '13800138004', userName: '钱七', avatar: logoUrl, lastMessage: '密码忘记了', lastTime: '前天', unread: 0, status: 'offline', tags: ['账号问题'] },
    ];

    const mockUsers = [
      { id: '13800138000', name: '张三', phone: '138****8000', balance: 8888.88, totalDeposit: 50000, totalWithdraw: 30000, registerTime: '2026-01-15', lastLogin: '2026-04-30 10:30', status: 'active', vip: 3 },
      { id: '13800138001', name: '李四', phone: '138****8001', balance: 5200.00, totalDeposit: 30000, totalWithdraw: 15000, registerTime: '2026-02-20', lastLogin: '2026-04-30 09:45', status: 'active', vip: 2 },
      { id: '13800138002', name: '王五', phone: '138****8002', balance: 1200.50, totalDeposit: 10000, totalWithdraw: 8000, registerTime: '2026-03-10', lastLogin: '2026-04-29 18:20', status: 'active', vip: 1 },
      { id: '13800138003', name: '赵六', phone: '138****8003', balance: 0, totalDeposit: 5000, totalWithdraw: 5000, registerTime: '2026-03-25', lastLogin: '2026-04-28 15:00', status: 'suspended', vip: 0 },
    ];

    const quickReplies = [
      { id: '1', title: '充值到账时间', content: '充值提交后由人工核对，一般当日处理，请保持在线。' },
      { id: '2', title: '提现规则', content: '提现需在工作日 9:00—21:00 发起，具体以风控审核为准。' },
      { id: '3', title: '修改银行卡', content: '请发送开户名与卡号后四位，我们将引导您完成核验。' },
      { id: '4', title: '代理申请', content: '代理申请需要满足充值满10000元，请联系客服提交申请。' },
      { id: '5', title: '密码重置', content: '请点击登录页面的"忘记密码"，按照提示进行密码重置操作。' },
    ];

    const stats = [
      { label: '今日注册用户', value: '128', change: '+12%', icon: 'fa-user-plus', color: 'bg-blue-500' },
      { label: '今日充值金额', value: '¥128,888', change: '+23%', icon: 'fa-credit-card', color: 'bg-green-500' },
      { label: '今日提现金额', value: '¥86,520', change: '+8%', icon: 'fa-wallet', color: 'bg-amber-500' },
      { label: '在线用户', value: '1,286', change: '+5%', icon: 'fa-users', color: 'bg-purple-500' },
    ];

    const tabs = [
      { id: 'dashboard', name: '数据概览', icon: 'fa-chart-bar' },
      { id: 'support', name: '客服中心', icon: 'fa-headset' },
      { id: 'users', name: '用户管理', icon: 'fa-users' },
      { id: 'banners', name: '轮播图', icon: 'fa-image' },
      { id: 'games', name: '游戏配置', icon: 'fa-gamepad' },
      { id: 'notices', name: '公告管理', icon: 'fa-bullhorn' },
    ];

    let activeTab = 'dashboard';
    let config = JSON.parse(localStorage.getItem('site_config')) || defaultConfig;
    let newImageUrl = '';
    let newNotice = '';
    let selectedSession = null;
    let chatMessage = '';
    let showQuickReplies = false;
    let searchQuery = '';
    let filterStatus = 'all';

    function saveConfig() {
      localStorage.setItem('site_config', JSON.stringify(config));
      alert('配置已保存');
    }

    function addBanner() {
      if (!newImageUrl) return;
      config.banners.push({ id: Date.now(), image: newImageUrl, link: '' });
      newImageUrl = '';
      render();
    }

    function removeBanner(id) {
      config.banners = config.banners.filter(b => b.id !== id);
      render();
    }

    function updateGameImage(id, image) {
      const game = config.gameImages.find(g => g.id === id);
      if (game) game.image = image;
      render();
    }

    function addNotice() {
      if (!newNotice) return;
      config.notices.push(newNotice);
      newNotice = '';
      render();
    }

    function removeNotice(idx) {
      config.notices.splice(idx, 1);
      render();
    }

    function getFilteredSessions() {
      return mockSessions.filter(session => {
        if (filterStatus === 'online') return session.status === 'online';
        if (filterStatus === 'unread') return session.unread > 0;
        return true;
      }).filter(session =>
        session.userName.includes(searchQuery) ||
        session.lastMessage.includes(searchQuery)
      );
    }

    function renderDashboard() {
      return `
        <div class="space-y-6 fade-in">
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            ${stats.map((stat, idx) => `
              <div class="bg-white rounded-xl p-5 border border-slate-200 shadow-sm" style="animation-delay: ${idx * 0.1}s">
                <div class="flex items-start justify-between">
                  <div>
                    <p class="text-slate-500 text-sm">${stat.label}</p>
                    <p class="text-2xl font-bold text-slate-900 mt-1">${stat.value}</p>
                    <p class="text-green-500 text-sm mt-1">${stat.change}</p>
                  </div>
                  <div class="w-10 h-10 rounded-lg ${stat.color} flex items-center justify-center text-white">
                    <i class="fas ${stat.icon}"></i>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>

          <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="bg-white rounded-xl p-5 border border-slate-200 shadow-sm">
              <div class="flex items-center justify-between mb-4">
                <h3 class="font-semibold text-slate-900">充值趋势</h3>
                <select class="text-sm border border-slate-200 rounded-lg px-3 py-1">
                  <option>最近7天</option>
                  <option>最近30天</option>
                </select>
              </div>
              <div class="h-48 flex items-end justify-between gap-2">
                ${[65, 45, 80, 55, 90, 70, 85].map((h, i) => `
                  <div class="flex-1 flex flex-col items-center gap-2">
                    <div class="w-full bg-primary-500 rounded-t-lg transition-all hover:bg-primary-600" style="height: ${h}%"></div>
                    <span class="text-xs text-slate-500">${['一','二','三','四','五','六','日'][i]}</span>
                  </div>
                `).join('')}
              </div>
            </div>

            <div class="bg-white rounded-xl p-5 border border-slate-200 shadow-sm">
              <div class="flex items-center justify-between mb-4">
                <h3 class="font-semibold text-slate-900">用户分布</h3>
                <button class="text-sm text-primary-600 hover:underline">查看详情</button>
              </div>
              <div class="space-y-4">
                ${[
                  { label: 'VIP用户', value: 328, total: 1286, color: 'bg-amber-500' },
                  { label: '普通用户', value: 856, total: 1286, color: 'bg-primary-500' },
                  { label: '新注册用户', value: 102, total: 1286, color: 'bg-green-500' },
                ].map(item => `
                  <div>
                    <div class="flex items-center justify-between mb-1">
                      <span class="text-sm text-slate-600">${item.label}</span>
                      <span class="text-sm font-medium text-slate-900">${item.value}人</span>
                    </div>
                    <div class="h-2 bg-slate-100 rounded-full">
                      <div class="h-full rounded-full ${item.color}" style="width: ${(item.value / item.total) * 100}%"></div>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>

          <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
            <div class="p-5 border-b border-slate-100">
              <h3 class="font-semibold text-slate-900">最近动态</h3>
            </div>
            <div class="divide-y divide-slate-100">
              ${[
                { action: '用户充值', user: '张三', amount: '¥10,000', time: '2分钟前', type: 'success' },
                { action: '用户提现', user: '李四', amount: '¥5,000', time: '5分钟前', type: 'warning' },
                { action: '新用户注册', user: '王五', amount: '-', time: '10分钟前', type: 'info' },
                { action: '用户中奖', user: '赵六', amount: '¥88,888', time: '15分钟前', type: 'success' },
              ].map((item, idx) => `
                <div class="p-4 flex items-center justify-between hover:bg-slate-50">
                  <div class="flex items-center gap-3">
                    <div class="w-2 h-2 rounded-full ${item.type === 'success' ? 'bg-green-500' : item.type === 'warning' ? 'bg-amber-500' : 'bg-blue-500'}"></div>
                    <span class="text-slate-900">${item.action}</span>
                    <span class="text-slate-500">-</span>
                    <span class="text-slate-700 font-medium">${item.user}</span>
                  </div>
                  <div class="flex items-center gap-4">
                    <span class="font-medium text-slate-900">${item.amount}</span>
                    <span class="text-sm text-slate-400">${item.time}</span>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      `;
    }

    function renderSupport() {
      const filtered = getFilteredSessions();
      return `
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 fade-in" style="height: calc(100vh - 200px)">
          <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="p-4 border-b border-slate-100">
              <div class="flex items-center justify-between mb-3">
                <h3 class="font-semibold text-slate-900 flex items-center gap-2">
                  <i class="fas fa-comments text-primary-600"></i>
                  客服会话
                  <span class="px-2 py-0.5 bg-red-100 text-red-600 text-xs rounded-full">${mockSessions.reduce((acc, s) => acc + s.unread, 0)}</span>
                </h3>
              </div>
              <div class="flex gap-2">
                <div class="flex-1 relative">
                  <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                  <input type="text" value="${searchQuery}" oninput="searchQuery = this.value; render()" placeholder="搜索用户..." class="w-full pl-9 pr-3 py-2 border border-slate-200 rounded-lg text-sm">
                </div>
                <select onchange="filterStatus = this.value; render()" class="border border-slate-200 rounded-lg px-3 py-2 text-sm">
                  <option value="all" ${filterStatus === 'all' ? 'selected' : ''}>全部</option>
                  <option value="online" ${filterStatus === 'online' ? 'selected' : ''}>在线</option>
                  <option value="unread" ${filterStatus === 'unread' ? 'selected' : ''}>未读</option>
                </select>
              </div>
            </div>
            <div class="overflow-y-auto" style="height: calc(100% - 100px)">
              ${filtered.map(session => `
                <button onclick="selectedSession = mockSessions.find(s => s.id === '${session.id}'); render()" class="w-full p-4 flex items-start gap-3 hover:bg-slate-50 transition-colors border-b border-slate-100 last:border-0 ${selectedSession?.id === session.id ? 'bg-primary-50' : ''}">
                  <div class="relative">
                    <img src="${session.avatar}" alt="" class="w-10 h-10 rounded-full">
                    <span class="absolute -bottom-0.5 -right-0.5 w-3 h-3 rounded-full border-2 border-white ${session.status === 'online' ? 'bg-green-500' : session.status === 'busy' ? 'bg-amber-500' : 'bg-slate-400'}"></span>
                  </div>
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center justify-between">
                      <span class="font-medium text-slate-900">${session.userName}</span>
                      <span class="text-xs text-slate-400">${session.lastTime}</span>
                    </div>
                    <p class="text-sm text-slate-500 truncate">${session.lastMessage}</p>
                    <div class="flex items-center gap-2 mt-1">
                      ${session.tags.map(tag => `<span class="px-1.5 py-0.5 bg-slate-100 text-slate-600 text-xs rounded">${tag}</span>`).join('')}
                    </div>
                  </div>
                  ${session.unread > 0 ? `<span class="px-1.5 py-0.5 bg-red-500 text-white text-xs rounded-full min-w-[18px] text-center">${session.unread}</span>` : ''}
                </button>
              `).join('')}
            </div>
          </div>

          <div class="lg:col-span-2 bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
            ${selectedSession ? `
              <div class="h-full flex flex-col">
                <div class="p-4 border-b border-slate-100 flex items-center justify-between">
                  <div class="flex items-center gap-3">
                    <img src="${selectedSession.avatar}" alt="" class="w-10 h-10 rounded-full">
                    <div>
                      <h4 class="font-semibold text-slate-900">${selectedSession.userName}</h4>
                      <p class="text-xs text-slate-500">ID: ${selectedSession.userId}</p>
                    </div>
                  </div>
                  <div class="flex items-center gap-2">
                    <button class="p-2 text-slate-400 hover:text-slate-600"><i class="fas fa-phone"></i></button>
                    <button class="p-2 text-slate-400 hover:text-slate-600"><i class="fas fa-envelope"></i></button>
                    <button class="p-2 text-slate-400 hover:text-slate-600"><i class="fas fa-ellipsis-h"></i></button>
                  </div>
                </div>

                <div class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50">
                  <div class="text-center">
                    <span class="text-xs text-slate-400">会话开始于 ${selectedSession.lastTime}</span>
                  </div>
                  <div class="flex justify-start">
                    <div class="max-w-[70%] bg-white rounded-2xl rounded-tl-none px-4 py-3 shadow-sm">
                      <p class="text-slate-700">${selectedSession.lastMessage}</p>
                      <span class="text-xs text-slate-400 mt-1">${selectedSession.lastTime}</span>
                    </div>
                  </div>
                  <div class="flex justify-end">
                    <div class="max-w-[70%] bg-primary-600 rounded-2xl rounded-tr-none px-4 py-3 text-white">
                      <p>您好，已收到您的消息，客服专员正在处理，请稍候...</p>
                      <span class="text-xs text-primary-200 mt-1">刚刚</span>
                    </div>
                  </div>
                </div>

                <div class="p-4 border-t border-slate-100">
                  ${showQuickReplies ? `
                    <div class="mb-3 flex flex-wrap gap-2">
                      ${quickReplies.map(reply => `
                        <button onclick="chatMessage = '${reply.content.replace(/'/g, "\\'")}; showQuickReplies = false; render()" class="px-3 py-1.5 bg-slate-100 text-slate-700 text-sm rounded-lg hover:bg-slate-200 transition-colors">${reply.title}</button>
                      `).join('')}
                    </div>
                  ` : ''}
                  <div class="flex gap-2">
                    <button class="p-2 text-slate-400 hover:text-slate-600"><i class="fas fa-paperclip"></i></button>
                    <button onclick="showQuickReplies = !showQuickReplies; render()" class="p-2 text-slate-400 hover:text-slate-600">
                      <i class="fas fa-chevron-down transition-transform ${showQuickReplies ? 'rotate-180' : ''}"></i>
                    </button>
                    <input type="text" value="${chatMessage}" oninput="chatMessage = this.value" placeholder="输入消息..." class="flex-1 border border-slate-200 rounded-lg px-3 py-2">
                    <button class="p-2 text-slate-400 hover:text-slate-600"><i class="fas fa-smile"></i></button>
                    <button class="px-4 py-2 bg-primary-600 text-white rounded-lg hover:bg-primary-700"><i class="fas fa-paper-plane"></i></button>
                  </div>
                </div>
              </div>
            ` : `
              <div class="h-full flex items-center justify-center text-slate-400">
                <div class="text-center">
                  <i class="fas fa-comments text-4xl mb-3 opacity-50"></i>
                  <p>选择一个会话开始聊天</p>
                </div>
              </div>
            `}
          </div>
        </div>
      `;
    }

    function renderUsers() {
      return `
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm fade-in">
          <div class="p-4 border-b border-slate-100 flex items-center justify-between">
            <h3 class="font-semibold text-slate-900">用户管理</h3>
            <div class="flex gap-2">
              <div class="relative">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                <input type="text" placeholder="搜索用户..." class="pl-9 pr-3 py-2 border border-slate-200 rounded-lg text-sm">
              </div>
              <button class="px-3 py-2 bg-primary-600 text-white rounded-lg text-sm">导出数据</button>
            </div>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full">
              <thead class="bg-slate-50">
                <tr>
                  <th class="px-4 py-3 text-left text-sm font-medium text-slate-600">用户</th>
                  <th class="px-4 py-3 text-left text-sm font-medium text-slate-600">手机号</th>
                  <th class="px-4 py-3 text-left text-sm font-medium text-slate-600">余额</th>
                  <th class="px-4 py-3 text-left text-sm font-medium text-slate-600">累计充值</th>
                  <th class="px-4 py-3 text-left text-sm font-medium text-slate-600">累计提现</th>
                  <th class="px-4 py-3 text-left text-sm font-medium text-slate-600">VIP</th>
                  <th class="px-4 py-3 text-left text-sm font-medium text-slate-600">状态</th>
                  <th class="px-4 py-3 text-left text-sm font-medium text-slate-600">操作</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-slate-100">
                ${mockUsers.map(user => `
                  <tr class="hover:bg-slate-50">
                    <td class="px-4 py-3">
                      <div class="flex items-center gap-2">
                        <div class="w-8 h-8 rounded-full bg-primary-100 flex items-center justify-center text-primary-600 font-medium">${user.name[0]}</div>
                        <div>
                          <p class="font-medium text-slate-900">${user.name}</p>
                          <p class="text-xs text-slate-500">ID: ${user.id}</p>
                        </div>
                      </div>
                    </td>
                    <td class="px-4 py-3 text-sm text-slate-600">${user.phone}</td>
                    <td class="px-4 py-3 text-sm font-medium text-slate-900">¥${user.balance.toFixed(2)}</td>
                    <td class="px-4 py-3 text-sm text-slate-600">¥${user.totalDeposit.toLocaleString()}</td>
                    <td class="px-4 py-3 text-sm text-slate-600">¥${user.totalWithdraw.toLocaleString()}</td>
                    <td class="px-4 py-3">
                      <span class="px-2 py-1 bg-amber-100 text-amber-700 text-xs rounded-full">VIP${user.vip}</span>
                    </td>
                    <td class="px-4 py-3">
                      <span class="px-2 py-1 text-xs rounded-full ${user.status === 'active' ? 'bg-green-100 text-green-700' : user.status === 'suspended' ? 'bg-amber-100 text-amber-700' : 'bg-red-100 text-red-700'}">
                        ${user.status === 'active' ? '正常' : user.status === 'suspended' ? '暂停' : '封禁'}
                      </span>
                    </td>
                    <td class="px-4 py-3">
                      <div class="flex gap-2">
                        <button class="text-sm text-primary-600 hover:underline">详情</button>
                        <button class="text-sm text-slate-600 hover:underline">编辑</button>
                      </div>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function renderBanners() {
      return `
        <div class="space-y-4 fade-in">
          <div class="bg-white rounded-xl border border-slate-200 p-4">
            <h3 class="font-medium text-slate-900 mb-3">添加轮播图</h3>
            <div class="flex gap-2">
              <input type="text" value="${newImageUrl}" oninput="newImageUrl = this.value" placeholder="输入图片URL" class="flex-1 border border-slate-200 rounded-lg px-3 py-2">
              <button onclick="addBanner()" class="px-4 py-2 bg-primary-600 text-white rounded-lg hover:bg-primary-700">添加</button>
            </div>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            ${config.banners.map(banner => `
              <div class="bg-white rounded-xl border border-slate-200 p-3">
                <img src="${banner.image}" alt="banner" class="w-full h-32 object-cover rounded-lg mb-2">
                <button onclick="removeBanner(${banner.id})" class="w-full py-2 bg-red-50 text-red-500 rounded-lg text-sm hover:bg-red-100">删除</button>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function renderGames() {
      return `
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 fade-in">
          ${config.gameImages.map(game => `
            <div class="bg-white rounded-xl border border-slate-200 p-4">
              <div class="flex items-center gap-3 mb-3">
                <span class="font-medium text-slate-900">${game.id}</span>
              </div>
              <img src="${game.image}" alt="${game.id}" class="w-full h-24 object-cover rounded-lg mb-2">
              <input type="text" value="${game.image}" onchange="updateGameImage('${game.id}', this.value)" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm">
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderNotices() {
      return `
        <div class="space-y-4 fade-in">
          <div class="bg-white rounded-xl border border-slate-200 p-4">
            <h3 class="font-medium text-slate-900 mb-3">添加公告</h3>
            <div class="flex gap-2">
              <input type="text" value="${newNotice}" oninput="newNotice = this.value" placeholder="输入公告内容" class="flex-1 border border-slate-200 rounded-lg px-3 py-2">
              <button onclick="addNotice()" class="px-4 py-2 bg-primary-600 text-white rounded-lg hover:bg-primary-700">添加</button>
            </div>
          </div>
          <div class="space-y-2">
            ${config.notices.map((notice, idx) => `
              <div class="bg-white rounded-xl border border-slate-200 p-3 flex justify-between items-center">
                <span class="text-slate-700">${notice}</span>
                <button onclick="removeNotice(${idx})" class="px-3 py-1 bg-red-50 text-red-500 rounded-lg text-sm hover:bg-red-100">删除</button>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function render() {
      const root = document.getElementById('root');
      root.innerHTML = `
        <div class="min-h-screen bg-slate-50">
          <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
            <div class="container-responsive">
              <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                  <button onclick="history.back()" class="p-2 -ml-2 text-slate-600 hover:text-slate-900">
                    <i class="fas fa-chevron-left"></i>
                  </button>
                  <div class="w-8 h-8 rounded-lg overflow-hidden">
                    <img src="${logoUrl}" alt="大都汇" class="w-full h-full object-cover">
                  </div>
                  <h1 class="text-xl font-bold text-slate-900">大都汇管理后台</h1>
                </div>
                <div class="flex items-center gap-4">
                  <button class="p-2 text-slate-400 hover:text-slate-600 relative">
                    <i class="fas fa-bell"></i>
                    <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
                  </button>
                  <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-full bg-primary-100 flex items-center justify-center text-primary-600 font-medium">管</div>
                    <span class="text-sm text-slate-700 hidden sm:block">管理员</span>
                  </div>
                  <button onclick="location.href='login.html'" class="p-2 text-slate-400 hover:text-red-500">
                    <i class="fas fa-sign-out-alt"></i>
                  </button>
                </div>
              </div>
            </div>
          </header>

          <div class="container-responsive py-6">
            <div class="flex flex-col lg:flex-row gap-6">
              <aside class="lg:w-64 flex-shrink-0">
                <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                  ${tabs.map(tab => `
                    <button onclick="activeTab = '${tab.id}'; render()" class="w-full flex items-center gap-3 px-4 py-3 text-left transition-colors ${activeTab === tab.id ? 'bg-primary-50 text-primary-700 border-r-2 border-primary-600' : 'text-slate-600 hover:bg-slate-50'}">
                      <i class="fas ${tab.icon} w-5"></i>
                      <span class="font-medium">${tab.name}</span>
                      ${tab.id === 'support' ? '<span class="ml-auto px-1.5 py-0.5 bg-red-100 text-red-600 text-xs rounded-full">3</span>' : ''}
                    </button>
                  `).join('')}
                </div>
              </aside>

              <main class="flex-1 min-w-0">
                ${activeTab === 'dashboard' ? renderDashboard() : ''}
                ${activeTab === 'support' ? renderSupport() : ''}
                ${activeTab === 'users' ? renderUsers() : ''}
                ${activeTab === 'banners' ? renderBanners() : ''}
                ${activeTab === 'games' ? renderGames() : ''}
                ${activeTab === 'notices' ? renderNotices() : ''}
              </main>
            </div>
          </div>
        </div>
      `;
    }

    render();
  </script>
</body>
</html>
