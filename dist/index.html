<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>大都汇 · 官方娱乐</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>/* 内联样式确保主题色立即生效，避免闪烁 */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }
    html.light, html.light body {
      background-color: #ffffff !important;
      color: #000000;
    }
    html.dark, html.dark body {
      background-color: #1a1a1a !important;
      color: #ffffff;
    }</style><script>/**
     * 接口根地址（无尾斜杠）。留空则请求当前站点下的 /api（本地 dev 会代理到 Node；纯 Vercel 静态部署会变成整页 HTML，接口全废）。
     * 仅 Vercel 预览：必须二选一——
     * 1）Vercel → Settings → Environment Variables → 新增 API_BASE=https://你的公网Node （部署 pangxie/server 的机器）→ Redeploy；
     * 2）或把下面改成同一地址后重新 build。
     */
    window.__PANGXIE_API_BASE__ = '';</script><script>// 在 React 加载前立即设置主题，避免闪烁
    (function() {
      const isInIframe = window.self !== window.top;

      function applyThemeToDOM(theme) {
        document.documentElement.classList.remove('light', 'dark');
        document.documentElement.classList.add(theme);
        document.documentElement.setAttribute('data-theme', theme);
      }

      if (isInIframe) {
        // 监听父窗口主动推送的主题消息
        window.addEventListener('message', function(event) {
          if (event.data && typeof event.data.theme === 'string') {
            const theme = event.data.theme;
            if (theme === 'light' || theme === 'dark') {
              applyThemeToDOM(theme);
            }
          }
        });
      } else {
        // 非 iframe 环境，使用默认 light 主题
        applyThemeToDOM('light');
      }
    })();</script></head><body><div id="root"></div><script defer="defer" src="/bundle.js"></script></body></html>
